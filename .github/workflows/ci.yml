name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Python 3.12 は tokenizers 0.13.3（ja-ginza-electra → transformers 経由）の
        # wheel が配布されておらず、新しい Rust でソースビルドも失敗するため対象外。
        # Docker イメージ側の Python 3.11 での動作担保を正とする。
        python-version: ['3.11']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # GiNZA モデル（テストはモックされているが import 時に必要な場合に備える）
          python -m spacy download ja_ginza_electra || echo "ja_ginza_electra のダウンロードに失敗（テストはモックされているため継続）"

      - name: Run pytest with coverage
        run: |
          python -m pytest tests/ -v \
            --cov=core --cov=file_handlers --cov=ui --cov=mcp \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  lint:
    name: Lint / syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff (syntax / common issues)
        run: |
          ruff check . --select=E9,F63,F7,F82 --output-format=github
        continue-on-error: false

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: pii-masker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
