version: 2

updates:
  # Python 依存（pyproject.toml）
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "build"
      include: "scope"
    ignore:
      # GiNZA/spaCy/ja-ginza-electra は Python バージョン・モデル・sudachipy と
      # 強く連動しており、自動 major bump はビルド失敗に直結する。
      # 互換性を手動確認したうえで個別に更新する方針。
      - dependency-name: "ja-ginza-electra"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "ginza"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "spacy"
        update-types: ["version-update:semver-major"]
    groups:
      # マイナー / パッチは 1 つの PR にまとめる
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Docker ベースイメージ（Dockerfile）
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build"
      include: "scope"
    ignore:
      # ja-ginza-electra が対応する Python は 3.11〜3.12 のみ。
      # pyproject.toml でも requires-python = ">=3.11,<3.13" と固定している。
      # Python 3.13+ への major/minor bump は自動適用しない。
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
